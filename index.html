<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROPSA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --azul:#0b3c66;
  --azul-claro:#1f6fb2;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:#fff;
}

header{
  text-align:center;
  padding:30px 20px;
  border-bottom:1px solid #eee;
}

header h1{
  color:var(--azul);
  font-weight:800;
}

header img{
  width:140px;
  margin-top:10px;
}

.section{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.section-title{
  text-align:center;
  margin:40px 0 20px;
}

.section-title h2{
  color:var(--azul);
}

.buttons{
  display:grid;
  gap:12px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--azul);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:var(--azul-claro);
}

</style>
</head>

<body>

<header>
  <h1>DROPSA</h1>
  <img src="Whats-App-Image-2024-12-23-at-4-15-01-AM-1.jpg" alt="logo">
</header>

<div class="section">

  <div class="section-title">
    <h2>Bombas</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/idilsadropsaparte2/p%C3%A1gina-principal')">Bombas eléctricas</button>
    <button onclick="window.open('https://sites.google.com/view/dropsa-parte-4/p%C3%A1gina-principal')">Bombas neumáticas</button>
    <button onclick="window.open('https://sites.google.com/view/dropsa-parte-7/p%C3%A1gina-principal')">Bombas de engranajes</button>
  </div>

  <div class="section-title">
    <h2>Dosificadores</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/dropsa-parte-12/p%C3%A1gina-principal')">Progresivos</button>
    <button onclick="window.open('https://sites.google.com/view/dropsa-parte-13/p%C3%A1gina-principal')">Línea doble</button>
  </div>

  <div class="section-title">
    <h2>Inyectores y Reguladores</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/valvulas--33v/p%C3%A1gina-principal')">Válvulas 33V</button>
    <button onclick="window.open('https://sites.google.com/view/inyectores-especial/p%C3%A1gina-principal')">Inyectores Especiales 33V</button>
    <button onclick="window.open('https://sites.google.com/view/inyectores-33v-m10/p%C3%A1gina-principal')">Inyectores 33V M10</button>
    <button onclick="window.open('https://sites.google.com/view/33v-oil-jet/p%C3%A1gina-principal')">33V OIL JET</button>
    <button onclick="window.open('https://sites.google.com/view/inyector-dl-33/p%C3%A1gina-principal')">DL 33</button>
    <button onclick="window.open('https://sites.google.com/view/inyectores-dl-32/p%C3%A1gina-principal')">Inyectores DL 32</button>
    <button onclick="window.open('https://sites.google.com/view/inyectores-dl-1-/p%C3%A1gina-principal')">Inyectores DL-1</button>
    <button onclick="window.open('https://sites.google.com/view/inyector-de-grasa-dl-32--/p%C3%A1gina-principal')">Inyector de grasa DL 32</button>
    <button onclick="window.open('https://sites.google.com/view/inyector-de-grasa-dl-33/p%C3%A1gina-principal')">Inyector de grasa DL 33</button>
    <button onclick="window.open('https://sites.google.com/view/dosificadores/p%C3%A1gina-principal')">Dosificadores de Línea Simple</button>
    <button onclick="window.open('https://sites.google.com/view/de-flujo-para-insta/p%C3%A1gina-principal')">Reguladores de flujo</button>
    <button onclick="window.open('https://sites.google.com/view/regulador-visivo-a-goteo/p%C3%A1gina-principal')">Regulador visivo a goteo</button>
  </div>

  <div class="section-title">
    <h2>Paneles de control</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/dispositivo-de-control-vip5/p%C3%A1gina-principal')">Panel de control VIP5</button>
    <button onclick="window.open('https://sites.google.com/view/vip5-plus-controller/p%C3%A1gina-principal')">VIP5 PLUS Controller</button>
    <button onclick="window.open('https://sites.google.com/view/vip5-pro-controller/p%C3%A1gina-principal')">VIP5 PRO</button>
    <button onclick="window.open('https://sites.google.com/view/vip5-pro-atex-controller/p%C3%A1gina-principal')">VIP5 PRO ATEX</button>
    <button onclick="window.open('https://sites.google.com/view/fact-controller/p%C3%A1gina-principal')">Fact Controller</button>
    <button onclick="window.open('https://sites.google.com/view/controller-bi-s/p%C3%A1gina-principal')">Controller Bi-S</button>
    <button onclick="window.open('https://sites.google.com/view/controller-bi-p/p%C3%A1gina-principal')">Controller Bi-P</button>
  </div>

</div>

</body>
</html>
